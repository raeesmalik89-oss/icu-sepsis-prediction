
name: ICU AIOps CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn joblib
    
    - name: Test data file exists
      run: |
        python -c "import os; assert os.path.exists('data/icu_patient_data.csv'), 'Data file missing'"
        echo "✅ Data file exists"
    
    - name: Test Python imports
      run: |
        python -c "import pandas; import sklearn; import joblib"
        echo "✅ All imports successful"

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Trivy
      run: |
        wget https://github.com/aquasecurity/trivy/releases/download/v0.52.2/trivy_0.52.2_Linux-64bit.deb
        sudo dpkg -i trivy_0.52.2_Linux-64bit.deb
        trivy --version
    
    - name: Run Trivy security scan
      run: |
        trivy fs --severity HIGH,CRITICAL --exit-code 0 .

  final-status:
    needs: [test, security-scan]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Check overall status
      run: |
        echo "========================================="
        echo "ICU AIOps CI/CD Pipeline Results"
        echo "========================================="
        echo "✅ Tests Completed"
        echo "✅ Security Scan Completed"
        echo ""
        echo "Status: Pipeline Executed Successfully"
